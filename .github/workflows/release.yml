name: Package release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package and upload
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - name: Build signed DMG
        run: scripts/package-dmg.sh "$RELEASE_TAG"
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" dist/*.dmg dist/*.dmg.sha256 --clobber
